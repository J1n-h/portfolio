<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이진헌 | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <a class="skip-link" href="#main">본문 바로가기</a>

    <header class="site-header">
        <div class="container header-inner">
            <a class="brand" href="#top" aria-label="처음으로">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-text">Jinheon</span>
            </a>
            <nav class="nav" aria-label="주요 메뉴">
                <a href="#skills">스택</a>
                <a href="#projects">프로젝트</a>
                <a href="#contact">연락</a>
            </nav>
        </div>
    </header>

    <main id="main">
        <section class="hero" id="top">
            <div class="container hero-inner">
                <div class="hero-text">
                    <p class="kicker">Sunrin Internet High School · Software</p>
                    <h1>이진헌</h1>
                    <p class="subtitle">아이디어를 실제 서비스로 만드는 것을 좋아합니다.</p>
                    <div class="cta-row">
                        <a class="btn primary" href="#projects">프로젝트 보기</a>
                        <a class="btn ghost" href="https://github.com/J1n-h" target="_blank" rel="noreferrer">GitHub</a>
                    </div>
                </div>
                <div class="hero-card" aria-label="요약 카드">
                    <div class="stat">
                        <div class="stat-label">관심 분야</div>
                        <div class="stat-value">Python · AI 서비스 개발 · 딥러닝과 머신러닝 · LLM</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">주요 기술</div>
                        <div class="stat-value">Python · C</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">현재</div>
                        <div class="stat-value">1학년 재학 중</div>
                    </div>
                </div>
            </div>
            <div class="hero-glow" aria-hidden="true"></div>
        </section>

        <section class="section" id="skills">
            <div class="container">
                <div class="section-head">
                    <h2>기술 스택</h2>
                </div>
                <div class="chips" aria-label="기술 스택 목록">
                    <span class="chip">Python</span>
                    <span class="chip">C</span>
                    <span class="chip">AI</span>
                </div>
            </div>
        </section>

        <section class="section" id="projects">
            <div class="container">
                <div class="section-head">
                    <h2>프로젝트</h2>
                </div>

                <div class="projects" id="project-list" aria-label="프로젝트 목록">
                    <!-- JS에서 프로젝트 카드 렌더링 -->
                </div>
            </div>
        </section>

        <section class="section" id="contact">
            <div class="container">
                <div class="section-head">
                    <h2>연락</h2>
                    <p>편하게 연락 주세요.</p>
                </div>
                <div class="contact-row">
                    <button class="btn ghost" id="copy-email" type="button">Email</button>
                    <a class="btn ghost" href="https://github.com/J1n-h" target="_blank" rel="noreferrer">GitHub</a>
                </div>
            </div>
        </section>
    </main>

    <div class="modal-backdrop" id="video-modal" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="video-title">
            <div class="modal-header">
                <div class="modal-title" id="video-title">YouTube</div>
                <button class="modal-close" id="video-close" type="button" aria-label="닫기">닫기</button>
            </div>
            <div class="modal-body" id="video-body"></div>
        </div>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; 2026 이진헌</p>
            <a href="#top" class="to-top">맨 위로</a>
        </div>
        <div class="container">
            <p class="footer-note">이 포트폴리오는 바이브코딩 방식으로 제작되었습니다.</p>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
